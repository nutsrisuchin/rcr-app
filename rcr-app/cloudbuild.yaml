steps:
  # Docker Build
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 
          '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${REPO_NAME}:${SHORT_SHA}', '.']

  # Docker push to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push',  '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${REPO_NAME}:${SHORT_SHA}']
      
  # Deploy to Cloud Run
  - name: google/cloud-sdk
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - '${REPO_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${REPO_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--cpu=${_CPU}'
      - '--memory=${_MEMORY}'
      - '--concurrency=${_CONCURRENCY}'
      - '--timeout=${_TIMEOUT}'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--service-account=${_SERVICE_ACCOUNT_NAME}'
      - '--session-affinity'
      - '--allow-unauthenticated'
      - '--execution-environment=gen2'

images:
 - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/${REPO_NAME}:${SHORT_SHA}'

substitutions:
  _REGION: 'asia-southeast1'
  _ARTIFACT_REGISTRY_REPO: 'cloudrun-app'
  _SERVICE_ACCOUNT_NAME: 'svca-gc-npr-hxai-run-web@prj-gc-npr-temai-rtai-01.iam.gserviceaccount.com'

# Cloud Build Service Account
#serviceAccount: 'projects/prj-gc-npr-temai-rtai-01/serviceAccounts/svca-gc-npr-hxai-build-iac@prj-gc-npr-temai-rtai-01.iam.gserviceaccount.com'

# Logging configuration
options:
  logging: CLOUD_LOGGING_ONLY    # Log only to Cloud Logging
  